name: OpenMic
options:
  bundleIdPrefix: com.willsigmon
  xcodeVersion: "16.0"
  deploymentTarget:
    iOS: "18.6"
    watchOS: "10.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

schemes:
  OpenMic-Compile:
    build:
      targets:
        OpenMic: all
  OpenMic-iOSOnly:
    build:
      targets:
        OpenMic: all
    run:
      config: Debug
      executable: OpenMic
    test:
      config: Debug
      targets:
        - OpenMicTests
        - OpenMicUITests
    profile:
      config: Release
      executable: OpenMic
    analyze:
      config: Debug
    archive:
      config: Release
  OpenMic-iOSBuildOnly:
    build:
      targets:
        OpenMiciOSBuildOnly: all

packages:
  SwiftOpenAI:
    url: https://github.com/jamesrochabrun/SwiftOpenAI
    from: "4.0.0"
  SwiftAnthropic:
    url: https://github.com/jamesrochabrun/SwiftAnthropic
    from: "2.0.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.41.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ALWAYS_SEARCH_USER_PATHS: NO

targets:
  OpenMic:
    type: application
    platform: iOS
    supportedDestinations: [iOS]
    sources:
      - path: OpenMic
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "18.6"
        INFOPLIST_FILE: OpenMic/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenMic/Resources/OpenMic.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 49HAGQE8FB
        PRODUCT_BUNDLE_IDENTIFIER: com.willsigmon.openmic
        PRODUCT_NAME: OpenMic
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: OpenMic/Resources/OpenMicDemo.entitlements
          ENABLE_TESTABILITY: YES
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    dependencies:
      - package: SwiftOpenAI
      - package: SwiftAnthropic
      - package: KeychainAccess
      - package: Supabase
      - target: OpenMicWatch
        embed: true
      - sdk: AuthenticationServices.framework
      - sdk: StoreKit.framework
      - sdk: UserNotifications.framework
      - sdk: CarPlay.framework
    preBuildScripts: []
    scheme:
      testTargets:
        - OpenMicTests
        - OpenMicUITests

  OpenMiciOSBuildOnly:
    type: application
    platform: iOS
    supportedDestinations: [iOS]
    sources:
      - path: OpenMic
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "18.6"
        INFOPLIST_FILE: OpenMic/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenMic/Resources/OpenMic.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 49HAGQE8FB
        PRODUCT_BUNDLE_IDENTIFIER: com.willsigmon.openmic.iosbuild
        PRODUCT_NAME: OpenMic iOS Build
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
      configs:
        Debug:
          ENABLE_TESTABILITY: YES
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    dependencies:
      - package: SwiftOpenAI
      - package: SwiftAnthropic
      - package: KeychainAccess
      - package: Supabase
      - sdk: AuthenticationServices.framework
      - sdk: StoreKit.framework
      - sdk: UserNotifications.framework
      - sdk: CarPlay.framework

  OpenMicWatch:
    type: application.watchapp2
    platform: watchOS
    sources:
      - path: OpenMicWatch/App
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SDKROOT: watchos
        SUPPORTED_PLATFORMS: "watchos watchsimulator"
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 49HAGQE8FB
        PRODUCT_BUNDLE_IDENTIFIER: com.willsigmon.openmic.watchkitapp
        PRODUCT_NAME: OpenMic Watch
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "2"
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: OpenMicWatch/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: OpenMicWatchExtension

  OpenMicWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    sources:
      - path: OpenMicWatch/Extension
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SDKROOT: watchos
        SUPPORTED_PLATFORMS: "watchos watchsimulator"
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 49HAGQE8FB
        PRODUCT_BUNDLE_IDENTIFIER: com.willsigmon.openmic.watchkitapp.watchkitextension
        PRODUCT_NAME: OpenMic Watch Extension
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "2"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: OpenMicWatch/Extension/Info.plist

  OpenMicTests:
    type: bundle.unit-test
    platform: iOS
    supportedDestinations: [iOS]
    sources:
      - path: OpenMicTests
    dependencies:
      - target: OpenMic
    settings:
      base:
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "18.6"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: OpenMicTests
        PRODUCT_BUNDLE_IDENTIFIER: com.willsigmon.openmic.tests
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OpenMic.app/OpenMic"
        BUNDLE_LOADER: "$(TEST_HOST)"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@loader_path/Frameworks"
          - "@executable_path/Frameworks"

  OpenMicUITests:
    type: bundle.ui-testing
    platform: iOS
    supportedDestinations: [iOS]
    sources:
      - path: OpenMicUITests
    dependencies:
      - target: OpenMic
    settings:
      base:
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "18.6"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: OpenMicUITests
        PRODUCT_BUNDLE_IDENTIFIER: com.willsigmon.openmic.uitests
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        TEST_TARGET_NAME: OpenMic
